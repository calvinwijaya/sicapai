<div class="mb-4 d-flex justify-content-between align-items-end flex-wrap gap-3">
    <div>
        <h2 class="fw-bold text-primary mb-1">Assign PIC TCK & Set Target</h2>
        <p class="text-muted mb-0">Kelola penugasan PIC dan set target untuk setiap indikator kinerja.</p>
    </div>
    
    <div class="d-flex align-items-center gap-2">
        <button id="btnEditMode" class="btn btn-warning btn-sm rounded-pill px-3 d-none" onclick="toggleEditMode()">
            <i class="bi bi-pencil-square me-1"></i> Edit Mode
        </button>
        
        <select id="filterTahunPIC" class="form-select form-select-sm w-auto" onchange="refreshDataPIC()">
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
        </select>
        
        <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="refreshDataPIC()">
            <i class="bi bi-arrow-clockwise me-1"></i> Refresh
        </button>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="tablePIC">
                <thead class="table-primary align-middle text-center">
                    <tr>
                        <th width="5%">No</th>
                        <th width="40%">Indikator Kinerja Program</th>
                        <th width="15%">PIC</th>
                        <th width="25%">Keterangan</th>
                        <th width="15%">Target</th>
                    </tr>
                </thead>
                <tbody id="tbodyPIC">
                    </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer bg-light text-end d-none" id="footerSaveAction">
        <button class="btn btn-secondary me-2 rounded-pill px-3" onclick="toggleEditMode()">Batal</button>
        <button class="btn btn-primary rounded-pill px-4" id="btnSavePIC" onclick="savePICData()">
            <i class="bi bi-save me-1"></i> Simpan Penugasan & Target
        </button>
    </div>
</div>
